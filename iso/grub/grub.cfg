# GRUB bootloader configuration for Hyper 32 live image
# Supports both BIOS (via grub-pc) and UEFI (via grub-efi) when built
# with grub-mkrescue.

set default=0
set timeout=5

# ── Visual ────────────────────────────────────────────────────────────────────
if loadfont /boot/grub/fonts/unicode.pf2; then
    set gfxmode=auto
    insmod all_video
    insmod gfxterm
    terminal_output gfxterm
fi

# ── Main menu ─────────────────────────────────────────────────────────────────
menuentry "Hyper 32 Live (x86_64)" {
    set root=(cd)
    linux  /boot/vmlinuz quiet console=tty0 console=ttyS0,115200 \
           init=/init \
           HYPER32_VERSION=__VERSION__
    initrd /boot/initramfs.cpio.gz
}

menuentry "Hyper 32 Live — verbose boot" {
    set root=(cd)
    linux  /boot/vmlinuz console=tty0 console=ttyS0,115200 \
           init=/init \
           HYPER32_VERSION=__VERSION__
    initrd /boot/initramfs.cpio.gz
}

menuentry "Boot from first hard drive" {
    set root=(hd0)
    chainloader +1
}
